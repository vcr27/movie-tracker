version: '3.8'

services:
  db:
    image: postgres:14
    container_name: movietracker-db
    environment:
      POSTGRES_DB: movietracker
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"

  app:
    build: .
    container_name: movietracker-app
    depends_on:
      - db
    environment:
      DB_URL: jdbc:postgresql://db:5432/movietracker
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
    ports:
      - "8080:8080"