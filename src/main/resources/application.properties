spring.application.name=movietracker

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${SHOW_SQL:false}

jwt.secret=${JWT_SECRET}
jwt.expiration-ms=${JWT_EXPIRATION_MS:3600000}
omdb.api-key=${OMDB_API_KEY}
tmdb.api-key=${TMDB_API_KEY:}
tmdb.base-url=${TMDB_BASE_URL:https://api.themoviedb.org/3}
tmdb.image-base-url=${TMDB_IMAGE_BASE_URL:https://image.tmdb.org/t/p/w500}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173,http://localhost:4173}

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when_authorized
management.endpoint.health.probes.enabled=true

logging.level.root=${ROOT_LOG_LEVEL:INFO}
logging.level.org.springframework.web=${SPRING_WEB_LOG_LEVEL:INFO}
logging.level.org.springframework.security=${SPRING_SECURITY_LOG_LEVEL:INFO}

spring.cache.type=${CACHE_TYPE:simple}
spring.cache.redis.time-to-live=${CACHE_TTL:10m}
spring.cache.redis.cache-null-values=false
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

app.suggestions.titles=${SUGGESTION_TITLES:Dune: Part Two,Oppenheimer,Inside Out 2,Deadpool & Wolverine,The Batman}
